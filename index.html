<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Hub</title>

<!-- 🔥 مكان إعلانك من Monetag -->
<!-- ضع كود الإعلان هنا -->
<!-- <script src="YOUR-AD-CODE"></script> -->

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{transform:scale(1.05)}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.name{
  padding:8px;
  text-align:center;
  font-size:13px;
}

/* صفحة اللعبة */
.game-page{
  display:none;
  padding:15px;
  text-align:center;
}

.play-btn{
  background:#22c55e;
  padding:15px;
  border-radius:10px;
  display:inline-block;
  margin-top:15px;
  cursor:pointer;
}
.back{
  color:#60a5fa;
  cursor:pointer;
  display:inline-block;
  margin:10px;
}
</style>
</head>

<body>

<header>🎮 Mini Game Hub</header>

<!-- 🔥 الصفحة الرئيسية -->
<div id="home" class="grid"></div>

<!-- 🎮 صفحة اللعبة -->
<div id="game" class="game-page">
  <div class="back" onclick="backHome()">⬅ Back</div>

  <h2 id="gameName"></h2>

  <img id="gameImg" width="90%">

  <!-- 🔥 إعلان داخل اللعبة -->
  <div style="margin:15px;">
    <!-- ضع إعلانك هنا -->
  </div>

  <div class="play-btn" onclick="playGame()">▶ Play Now</div>
</div>

<script>

const games = [
{
  name:"Car Racing",
  img:"https://img.crazygames.com/games/madalin-stunt-cars-2/cover-16x9.png",
  url:"https://playsnake.org/"
},
{
  name:"Snake Game",
  img:"https://img.crazygames.com/games/snake-is/cover-16x9.png",
  url:"https://playsnake.org/"
},
{
  name:"2048 Puzzle",
  img:"https://img.crazygames.com/games/2048/cover-16x9.png",
  url:"https://play2048.co/"
},
{
  name:"Chess",
  img:"https://img.crazygames.com/games/chess/cover-16x9.png",
  url:"https://www.chess.com/play/computer"
},
{
  name:"Pacman",
  img:"https://img.crazygames.com/games/pacman/cover-16x9.png",
  url:"https://freepacman.org/"
},
{
  name:"Sudoku",
  img:"https://img.crazygames.com/games/sudoku/cover-16x9.png",
  url:"https://sudoku.com/"
},
{
  name:"Tetris",
  img:"https://img.crazygames.com/games/tetris/cover-16x9.png",
  url:"https://tetris.com/play-tetris"
},
{
  name:"Crossy Road",
  img:"https://img.crazygames.com/games/crossy-road/cover-16x9.png",
  url:"https://crossyroadgame.com/"
},
{
  name:"Flappy Bird",
  img:"https://img.crazygames.com/games/flappy-bird/cover-16x9.png",
  url:"https://flappybird.io/"
},
{
  name:"Agar.io",
  img:"https://img.crazygames.com/games/agar-io/cover-16x9.png",
  url:"https://agar.io/"
}
];

// توليد ألعاب إضافية خفيفة (بدون ضغط على الموقع)
for(let i=1;i<=10;i++){
  games.push({
    name:"Mini Game " + i,
    img:"https://images.unsplash.com/photo-1511512578047-dfb367046420?w=300",
    url:"https://playsnake.org/"
  });
}

let currentGame = null;

const home = document.getElementById("home");
const gamePage = document.getElementById("game");

games.forEach((g,i)=>{
  const div = document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <img src="${g.img}" loading="lazy">
    <div class="name">${g.name}</div>
  `;

  div.onclick=()=>{
    currentGame=g;
    document.getElementById("gameName").innerText=g.name;
    document.getElementById("gameImg").src=g.img;

    home.style.display="none";
    gamePage.style.display="block";
  };

  home.appendChild(div);
});

function backHome(){
  home.style.display="grid";
  gamePage.style.display="none";
}

function playGame(){
  // 🔥 مكان الإعلان من Monetag (Popunder يشتغل هنا)
  window.open(currentGame.url,"_blank");
}

</script>

</body>
</html>
